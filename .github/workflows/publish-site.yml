name: Publish notebook site

# The exported notebooks fetch the DuckLake over HTTPS at runtime, so the
# site only needs rebuilding when the notebooks (or the build) change —
# not when the lake data refreshes.
on:
  push:
    branches: [main]
    paths:
      - "notebooks/**"
      - "scripts/build_site.sh"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: scripts/build_site.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
