name: Daily database refresh

on:
  schedule:
    # 14:00 UTC = 06:00 Anchorage (AKDT) / 05:00 (AKST), after the MOA's
    # nightly export has settled.
    - cron: "0 14 * * *"
  workflow_dispatch:

# Never let two refreshes write to the database at once; a late manual run
# just waits for the scheduled one to finish.
concurrency:
  group: lake-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DB_TARGET: r2
      # Non-secret R2 identifiers, same values as .env.example.
      R2_BUCKET: anchorage-property
      R2_ACCOUNT_ID: 9d0e65e8801b8e953ee7cb4c3e840ae8
      R2_PUBLIC_URL: https://pub-003dd855abeb48a1927aa93a77fc5471.r2.dev
      # From an R2 API token with Object Read & Write on the bucket.
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Restores the published archive from R2, scrapes the ArcGIS layer,
      # merges the snapshot into history, builds the browser artifact, and
      # publishes both .duckdb files.
      - name: Ingest
        run: pnpm run ingest

      # Vitest suite; error-severity checks fail the workflow. Attaches the
      # .duckdb files the ingest just left on disk (no R2 credentials used).
      - name: Data quality checks
        run: pnpm run dq
        env:
          DB_ATTACH: data/db-r2/anchorage.duckdb
          DB_ATTACH_CURRENT: data/db-r2/anchorage-current.duckdb
