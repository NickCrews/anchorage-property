name: Daily lake refresh

on:
  schedule:
    # 14:00 UTC = 06:00 Anchorage (AKDT) / 05:00 (AKST), after the MOA's
    # nightly export has settled.
    - cron: "0 14 * * *"
  workflow_dispatch:

# Never let two refreshes write to the lake at once; a late manual run just
# waits for the scheduled one to finish.
concurrency:
  group: lake-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LAKE_TARGET: r2
      # Non-secret R2 identifiers, same values as .env.example.
      R2_BUCKET: anchorage-property
      R2_ACCOUNT_ID: 9d0e65e8801b8e953ee7cb4c3e840ae8
      R2_PUBLIC_URL: https://pub-003dd855abeb48a1927aa93a77fc5471.r2.dev
      # From an R2 API token with Object Read & Write on the bucket.
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Restores the published catalog from R2, scrapes the ArcGIS layer,
      # merges the snapshot into history, and publishes the updated catalog.
      - name: Ingest
        run: pnpm run ingest

      # Vitest suite; error-severity checks fail the workflow. Attaches the
      # catalog the ingest just left on disk (its stored data path resolves
      # parquet over the bucket's public URL, so no R2 credentials are used).
      - name: Data quality checks
        run: pnpm run dq
        env:
          LAKE_ATTACH: ducklake:data/lake-r2/catalog.ducklake
