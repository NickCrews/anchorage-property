name: Daily database refresh

on:
  schedule:
    # 14:00 UTC = 06:00 Anchorage (AKDT) / 05:00 (AKST), after the MOA's
    # nightly export has settled.
    - cron: "0 14 * * *"
  workflow_dispatch:

# Never let two refreshes write to the database at once; a late manual run
# just waits for the scheduled one to finish. (Local runs are guarded
# separately: push is a compare-and-swap on the archive's ETag.)
concurrency:
  group: lake-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # No WORKSPACE set: the runner is ephemeral, so the "default" workspace
      # is fine — named workspaces exist to keep long-lived local copies apart.
      # Non-secret R2 identifiers, same values as .env.example.
      R2_BUCKET: anchorage-property
      R2_ACCOUNT_ID: 9d0e65e8801b8e953ee7cb4c3e840ae8
      R2_PUBLIC_URL: https://pub-003dd855abeb48a1927aa93a77fc5471.r2.dev
      # From an R2 API token with Object Read & Write on the bucket.
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The daily refresh is nothing more than the canned verb sequence; every
      # step is independently runnable and every prefix is a legitimate place
      # to stop.

      # Download the published archive into the workspace, recording its
      # ETag as the push baseline.
      - name: Pull
        run: pnpm run pull

      # Scrape the ArcGIS layer, SCD2-merge the snapshot into the workspace's
      # working copy, build the browser artifact. Strictly local.
      - name: Ingest
        run: pnpm run ingest

      # Full data-quality audit of the files the ingest just wrote.
      # Error-severity checks fail the workflow — before anything is public.
      - name: Audit
        run: pnpm run audit

      # Re-runs the error-severity checks in-process, then uploads with
      # If-Match on the pulled ETag so a concurrent writer can't be clobbered.
      - name: Push
        run: pnpm run push
